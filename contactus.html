<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events - Mountview</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/contactus.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/bottom-bar.css" />
</head>

<body>
  <div id="navbar"></div>
  <script src="js/menu.js"></script>
  <script src="js/include-navbar.js"></script>

  <section class="contact-section">
    <div class="contact-left">
      <h1>Reach out</h1>

      <p class="desc">
        Have any queries or clarifications? Drop us an enquiry through the
        form and our team will reach out to you as soon as possible.
      </p>

      <h3 class="small-title">Location</h3>
      <p class="address">
        Main road, Bhim Nagar, Panchgani, Maharashtra 412805
      </p>
      <a href="https://maps.app.goo.gl/7uRf9HzCkoWGVpcr8" class="map-link">Show on Map</a>

      <h3 class="small-title">Email</h3>
      <a href="mailto:mvinfo@hotelmountview.co.in" class="email-text">mvinfo@hotelmountview.co.in</a>

      <h3 class="small-title">Socials</h3>

      <div class="social-icons">
        <a href="https://www.instagram.com/mountviewheritagehotel/?hl=en"><img src="images/ig.png" alt="instagram"
            class="social-icon"></a>
        <a
          href="https://www.tripadvisor.in/Hotel_Review-g297653-d1149688-Reviews-Mount_View_Heritage_Hotel-Panchgani_Satara_District_Maharashtra.html"><img
            src="images/tr.png" alt="tripadvisor" class="social-icon"></a>
        <a
          href="https://www.booking.com/hotel/in/mount-view.en-gb.html?aid=311984&label=mount-view-Ls_NyqGd_mjLEyXaV6V1cwSM392993438594%3Apl%3Ata%3Ap1%3Ap2%3Aac%3Aap%3Aneg%3Afi%3Atiaud-2396393783680%3Akwd-352755223330%3Alp1007823%3Ali%3Adem%3Adm%3Appccp%3DUmFuZG9tSVYkc2RlIyh9YXORK0YJiVoOxcWODxYDaAA&sid=c86aaf79509062458a3b094f740e98a6&dest_id=-2107007&dest_type=city&dist=0&group_adults=2&group_children=0&hapos=1&hpos=1&no_rooms=1&req_adults=2&req_children=0&room1=A%2CA&sb_price_type=total&sr_order=popularity&srepoch=1766754617&srpvid=35525c9becd814c3&type=total&ucfs=1&"><img
            src="images/bo.png" alt="booking" class="social-icon"></a>
      </div>
    </div>

    <div class="contact-right">
      <form>
        <label>Name</label>
        <input type="text" placeholder="" />

        <div class="two-col">
          <div>
            <label>Phone No.</label>
            <input type="text" placeholder="Enter mobile number" />
          </div>

          <div>
            <label>Email</label>
            <input type="email" />
          </div>
        </div>

        <label>What service are you interested in</label>
        <select>
          <option>Select project type</option>
        </select>

        <label>Message</label>
        <textarea rows="6"></textarea>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>
  </section>

  <div id="footer-container"></div>
  <script src="js/include-footer.js"></script>

  <div id="bottom-bar"></div>
  <script src="js/include-bottom-bar.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/menu.js"></script>
</body>

</html>
