<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogs - Mountview</title>
  <link rel="icon" type="image/png" href="images/final-logo.png" />
  <!-- CSS -->
  <link rel="stylesheet" href="css/blogs.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/bottom-bar.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <!-- NAVBAR -->
  <div id="navbar"></div>
  <script src="js/menu.js"></script>
  <script src="js/include-navbar.js"></script>


  <!-- BLOG SECTION -->
  <section class="blogs-section">
    <h1 class="blogs-title">Blogs and Articles</h1>
    <div class="blogs-header-row">
      <p class="blogs-subtitle">Latest release</p>
      <div class="blogs-search">
        <input id="searchInput" type="text" placeholder="Search for a particular article" />
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
    </div>

    <div class="featured-blog">
      <img src="images/blog-hero.png" alt="Slow Travel in Panchgani" class="blog-hero-img" />
      <h3 class="blog-heading">Slow Travel in Panchgani</h3>

      <div class="blog-bottom">
        <div class="blog-tags">
          <span class="tag">Panchgani</span>
          <span class="tag">Tourist spots</span>
        </div>
        <span class="blog-date">25th Dec 2025</span>
      </div>
    </div>
    <hr class="blog-separator">
  </section>
  <section class="blogs-list-section">
    <div class="blogs-grid" id="blogsGrid">

      <!-- CARD 1 -->
      <div class="blog-card">
        <img src="images/ev10.png" alt="" />
        <h3>Heritage stays of Panchgani</h3>
        <div class="blog-card-footer">
          <div class="blog-tags">
            <span>Panchgani</span> <span>Tourist spots</span>
          </div>
          <span class="blog-date">27 Nov 2024</span>
        </div>
      </div>

      <!-- CARD 2 -->
      <div class="blog-card">
        <img src="images/hom1.png" alt="" />
        <h3>Old Bungalows of Panchgani</h3>
        <div class="blog-card-footer">
          <div class="blog-tags">
            <span>Panchgani</span> <span>Tourist spots</span>
          </div>
          <span class="blog-date">27 Nov 2024</span>
        </div>
      </div>


  </section>



  <script>
    const searchInput = document.getElementById("searchInput");
    const blogHeading = document.querySelector(".blog-heading");
    const featuredBlog = document.querySelector(".featured-blog");
    searchInput.addEventListener("keyup", function () {
      let value = searchInput.value.toLowerCase();
      if (blogHeading.textContent.toLowerCase().includes(value)) {
        featuredBlog.style.display = "block";
      } else {
        featuredBlog.style.display = "none";
      }
    });
  </script>


  <!-- FOOTER -->
  <div id="footer-container"></div>
  <script src="js/include-footer.js"></script>

  <div id="bottom-bar"></div>
  <script src="js/include-bottom-bar.js"></script>
  <script src="js/menu.js"></script>


</body>

</html>
